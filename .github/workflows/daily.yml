# Daily verse card — caller workflow (lives in the smruti site repo).
# Calls the central reusable generator in samskruti-archives, which renders each
# feed's card, commits daily/<feed>/today.* back here, and archives dated copies.
# No deploy_workflow: this site uses GitHub Pages "deploy from branch (main)",
# so the daily commit auto-publishes.
name: Daily verse card

on:
  schedule:
    # GitHub cron is UTC and ignores DST; two crons hit 4 AM Sydney year-round.
    - cron: "0 17 * * *"   # 4 AM AEDT / 5 AM AEST
    - cron: "0 18 * * *"   # 4 AM AEST / 5 AM AEDT
  workflow_dispatch:       # manual "run now" — bypasses the hour gate
    inputs:
      feeds:
        description: "Comma-separated feed ids to run (blank = all)."
        required: false
        default: ""
      script:
        description: "Verse script: te | sa | iast (blank = each feed's default)."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  daily:
    uses: npidaparthy/samskruti-archives/.github/workflows/daily-reusable.yml@main
    with:
      config: daily/config.json
      force: ${{ github.event_name == 'workflow_dispatch' }}
      feeds: ${{ inputs.feeds }}
      script: ${{ inputs.script }}
    secrets:
      ARCHIVE_TOKEN:  ${{ secrets.ARCHIVE_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
